name: Build OVF Image

on:
  workflow_dispatch:
    inputs:
      core_tag:
        description: "defguard core image tag"
        required: true
      proxy_tag:
        description: "defguard proxy image tag"
        required: true
      gateway_tag:
        description: "defguard gateway image tag"
        required: true
      publish_latest:
        description: "Also overwrite defguard-latest.ova (off = test build)"
        type: boolean
        default: false

jobs:
  build:
    runs-on: [self-hosted, Linux, X64]

    defaults:
      run:
        working-directory: ova

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ovmf awscli

      - name: Check KVM availability
        run: |
          if [ ! -e /dev/kvm ]; then
            echo "Error: /dev/kvm does not exist. KVM is required for this workflow."
            exit 1
          fi

          ls -la /dev/kvm

          if [ -r /dev/kvm ]; then
            echo "KVM readable"
          else
            echo "Error: /dev/kvm is not readable. Ensure the runner has KVM access (e.g., correct permissions and group membership)."
            exit 1
          fi

      - name: Setup Packer
        uses: hashicorp/setup-packer@v3
        with:
          version: "latest"

      - name: Download ISO
        run: |
          curl -fLO https://releases.ubuntu.com/24.04.4/ubuntu-24.04.4-live-server-amd64.iso

      - name: Packer init
        run: packer init defguard.pkr.hcl

      - name: Packer build
        env:
          PACKER_LOG: 1
        run: |
          CORE_TAG="${{ github.event.inputs.core_tag || '2' }}"
          PROXY_TAG="${{ github.event.inputs.proxy_tag || '2' }}"
          GATEWAY_TAG="${{ github.event.inputs.gateway_tag || '2' }}"
          packer build \
            -var "iso_url=file://$PWD/ubuntu-24.04.4-live-server-amd64.iso" \
            -var "core_tag=${CORE_TAG}" \
            -var "proxy_tag=${PROXY_TAG}" \
            -var "gateway_tag=${GATEWAY_TAG}" \
            defguard.pkr.hcl

      - name: Upload OVA to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-central-1
          CORE_TAG: ${{ github.event.inputs.core_tag || '2' }}
          PROXY_TAG: ${{ github.event.inputs.proxy_tag || '2' }}
          GATEWAY_TAG: ${{ github.event.inputs.gateway_tag || '2' }}
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          FILENAME="defguard_${TIMESTAMP}_core-${CORE_TAG}_edge-${PROXY_TAG}_gateway-${GATEWAY_TAG}.ova"
          ls -lh output/defguard/defguard.ova
          aws s3 cp output/defguard/defguard.ova "s3://defguard-downloads/ova/${FILENAME}"
          echo "Uploaded: s3://defguard-downloads/ova/${FILENAME}"

      - name: Test deployment modes on Proxmox
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          PROXMOX_HOST: ${{ secrets.PROXMOX_HOST }}
          PROXMOX_SSH_KEY: ${{ secrets.PROXMOX_SSH_KEY }}
          PVE_STORAGE: ${{ secrets.PVE_STORAGE }}
          SNIPPET_STORAGE: ${{ secrets.SNIPPET_STORAGE }}
          TEST_IP_PREFIX: ${{ secrets.TEST_IP_PREFIX }}
          TEST_GW: ${{ secrets.TEST_GW }}
          VMID_BASE: ${{ secrets.VMID_BASE }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$PROXMOX_SSH_KEY" > ~/.ssh/proxmox_ci
          chmod 600 ~/.ssh/proxmox_ci
          SSHOPT="-i $HOME/.ssh/proxmox_ci -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
          scp $SSHOPT output/defguard/defguard.ova test/test-deployment-modes.sh "ovaci@${PROXMOX_HOST}:/tmp/"
          # Forward only the secrets that are set; unset ones fall back to the script's defaults.
          REMOTE_ENV="STACK_TIMEOUT=1200"
          for v in PVE_STORAGE SNIPPET_STORAGE TEST_IP_PREFIX TEST_GW VMID_BASE; do
            [ -n "${!v}" ] && REMOTE_ENV="$REMOTE_ENV $v='${!v}'"
          done
          ssh $SSHOPT "ovaci@${PROXMOX_HOST}" "$REMOTE_ENV bash /tmp/test-deployment-modes.sh /tmp/defguard.ova"

      - name: Publish as latest
        if: ${{ inputs.publish_latest }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-central-1
        run: |
          aws s3 cp output/defguard/defguard.ova "s3://defguard-downloads/ova/defguard-latest.ova" \
            --cache-control "no-cache"
          echo "Updated: s3://defguard-downloads/ova/defguard-latest.ova"
