apiVersion: v1
kind: Service
metadata:
  labels:
    {{- include "defguard-proxy.labels" . | nindent 4 }}
  name: {{ include "defguard-proxy.fullname" . }}-grpc-headless
spec:
  clusterIP: None
  ports:
    - name: grpc
      port: {{ .Values.service.grpc.port }}
      protocol: TCP
      targetPort: grpc
  selector:
    {{- include "defguard-proxy.selectorLabels" . | nindent 4 }}
