# Defguard WireGuard gateway kernel tuning.
# Based on https://docs.defguard.net/deployment-strategies/linux-kernel-wireguard-tuning
# Sized for the default 2 vCPU / 2 GB appliance (baseline, up to ~100 active devices).
# IP forwarding is set separately in 99-defguard-forward.conf (defguard-firewall.sh).

# BBR reduces bufferbloat and is less sensitive to loss than the default CUBIC.
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# WireGuard is UDP; default socket buffers are too small for 1 Gbps+ and drop packets.
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.core.rmem_default = 262144
net.core.wmem_default = 262144
net.ipv4.udp_mem = 4096 87380 16777216

# Absorb traffic bursts without dropping at the kernel input queue / accept queue.
net.core.netdev_max_backlog = 5000
net.core.somaxconn = 8192

# NAPI polling budget for higher PPS (50 users and above recommendation).
net.core.netdev_budget = 600
net.core.netdev_budget_usecs = 4000

# Connection tracking for egress/masquerade through the VPN.
net.netfilter.nf_conntrack_max = 131072
